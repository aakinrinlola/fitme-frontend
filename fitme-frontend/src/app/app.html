<div class="app-layout">
  <aside class="sidebar">
    <div class="sidebar__top">
      <div class="brand">
        <div class="brand__logo">FM</div>
        <div class="brand__text">
          <div class="brand__name">FITME</div>
          <div class="brand__sub">Training System</div>
        </div>
      </div>
    </div>

    <nav class="sidebar__nav">
      <!-- Auth-only links (eingeloggt) -->
      <ng-container *ngIf="isLoggedIn">
        <a routerLink="/dashboard"            routerLinkActive="active">Dashboard</a>
        <a routerLink="/training-plan/create" routerLinkActive="active">Neuer Plan</a>
        <a routerLink="/history"              routerLinkActive="active">Verlauf</a>
        <a routerLink="/profile"              routerLinkActive="active">Profil</a>
        <div class="sidebar__divider"></div>
        <a class="sidebar__logout" (click)="logout()">Ausloggen</a>
      </ng-container>

      <!-- Guest links — NUR im Local-Modus  -->
      <ng-container *ngIf="!isLoggedIn && !isAuth0Mode">
        <div class="sidebar__divider"></div>
        <a routerLink="/login"    routerLinkActive="active">Login</a>
        <a routerLink="/register" routerLinkActive="active">Registrieren</a>
      </ng-container>

      <!-- Auth0-Modus: nicht eingeloggt → Login-Button -->
      <ng-container *ngIf="!isLoggedIn && isAuth0Mode">
        <div class="sidebar__divider"></div>
        <a class="sidebar__login-btn" (click)="authService.login()">Anmelden</a>
      </ng-container>
    </nav>

    <div class="sidebar__bottom">
      <div class="sidebar__hint">v0.1</div>
      <span *ngIf="currentUser" class="sidebar__user">{{ currentUser.username }}</span>
    </div>
  </aside>

  <main class="page">
    <div class="page__inner">
      <router-outlet></router-outlet>
    </div>
  </main>
</div>
