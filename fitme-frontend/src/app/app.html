<div class="app-layout">
  <aside class="sidebar">
    <div class="sidebar__top">
      <div class="brand">
        <div class="brand__logo">FM</div>
        <div class="brand__text">
          <div class="brand__name">FITME</div>
          <div class="brand__sub">Training System</div>
        </div>
      </div>
    </div>

    <nav class="sidebar__nav">
      <!-- Always visible -->
      <a routerLink="/homepage"  routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">Homepage</a>
      <a routerLink="/pricelist" routerLinkActive="active">Pricelist</a>
      <a routerLink="/aboutUs"   routerLinkActive="active">About Us</a>
      <a routerLink="/contact"   routerLinkActive="active">Contact</a>

      <!-- Auth-only links -->
      <ng-container *ngIf="isLoggedIn">
        <div class="sidebar__divider"></div>
        <a routerLink="/dashboard"            routerLinkActive="active">Dashboard</a>
        <a routerLink="/training-plan/create" routerLinkActive="active">Neuer Plan</a>
        <a routerLink="/tpchat"               routerLinkActive="active">TPChat</a>
        <a routerLink="/history"              routerLinkActive="active">Verlauf</a>
        <a routerLink="/profile"              routerLinkActive="active">Profil</a>
      </ng-container>

      <!-- Guest links -->
      <ng-container *ngIf="!isLoggedIn">
        <div class="sidebar__divider"></div>
        <a routerLink="/login"    routerLinkActive="active">Login</a>
        <a routerLink="/register" routerLinkActive="active">Registrieren</a>
      </ng-container>
    </nav>

    <div class="sidebar__bottom">
      <div class="sidebar__hint">v0.1</div>
      <span *ngIf="currentUser" class="sidebar__user">{{ currentUser.username }}</span>
    </div>
  </aside>

  <main class="page">
    <div class="page__inner">
      <router-outlet></router-outlet>
    </div>
  </main>
</div>
