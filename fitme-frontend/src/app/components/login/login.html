<div class="auth-page">
  <div class="auth-card">
    <div class="auth-card__brand">
      <div class="brand-logo">FM</div>
      <div class="brand-label">FITME</div>
    </div>

    <h1 class="auth-card__title">Anmelden</h1>
    <p class="auth-card__sub">Willkommen zurück. Logge dich ein.</p>

    <div *ngIf="errorMessage" class="alert alert--error">
      <span>⚠ {{ errorMessage }}</span>
    </div>

    <form (ngSubmit)="onSubmit()" #loginForm="ngForm" class="auth-form">
      <div class="form-group">
        <label class="form-label" for="usernameOrEmail">Username oder E-Mail</label>
        <input
          id="usernameOrEmail"
          class="form-input"
          type="text"
          [(ngModel)]="usernameOrEmail"
          name="usernameOrEmail"
          required
          placeholder="z.B. max oder max@mail.de"
          autocomplete="username"
        />
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Passwort</label>
        <input
          id="password"
          class="form-input"
          type="password"
          [(ngModel)]="password"
          name="password"
          required
          placeholder="Dein Passwort"
          autocomplete="current-password"
        />
      </div>

      <button
        type="submit"
        class="btn btn--primary"
        [disabled]="isLoading || !loginForm.valid"
      >
        <span *ngIf="!isLoading">Einloggen</span>
        <span *ngIf="isLoading" class="spinner"></span>
      </button>
    </form>

    <p class="auth-card__footer">
      Noch kein Konto?
      <a routerLink="/register" class="auth-link">Jetzt registrieren</a>
    </p>
  </div>
</div>
