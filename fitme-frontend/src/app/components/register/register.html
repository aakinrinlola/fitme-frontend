<div class="auth-page">
  <div class="auth-card">
    <div class="auth-card__brand">
      <div class="brand-logo">FM</div>
      <div class="brand-label">FITME</div>
    </div>

    <h1 class="auth-card__title">Registrieren</h1>
    <p class="auth-card__sub">Erstelle deinen Account und starte durch.</p>

    <div *ngIf="errorMessage" class="alert alert--error">
      <span>⚠ {{ errorMessage }}</span>
    </div>

    <form (ngSubmit)="onSubmit()" #regForm="ngForm" class="auth-form">
      <!-- Username -->
      <div class="form-group">
        <label class="form-label" for="username">Username *</label>
        <input
          id="username"
          class="form-input"
          type="text"
          [(ngModel)]="username"
          name="username"
          required
          minlength="3"
          maxlength="50"
          placeholder="Dein Username"
        />
      </div>

      <!-- E-Mail -->
      <div class="form-group">
        <label class="form-label" for="email">E-Mail *</label>
        <input
          id="email"
          class="form-input"
          type="email"
          [(ngModel)]="email"
          name="email"
          required
          placeholder="deine@email.de"
        />
      </div>

      <!-- Passwort -->
      <div class="form-group">
        <label class="form-label" for="password">Passwort * (min. 8 Zeichen)</label>
        <input
          id="password"
          class="form-input"
          type="password"
          [(ngModel)]="password"
          name="password"
          required
          minlength="8"
          placeholder="Mindestens 8 Zeichen"
          autocomplete="new-password"
        />
      </div>

      <!-- Fitness Level -->
      <div class="form-group">
        <label class="form-label" for="fitnessLevel">Fitnesslevel</label>
        <select
          id="fitnessLevel"
          class="form-select"
          [(ngModel)]="fitnessLevel"
          name="fitnessLevel"
        >
          <option *ngFor="let lvl of fitnessLevels" [value]="lvl.value">{{ lvl.label }}</option>
        </select>
      </div>

      <!-- Optional: Age + Weight -->
      <div class="form-row">
        <div class="form-group">
          <label class="form-label" for="age">Alter (optional)</label>
          <input
            id="age"
            class="form-input"
            type="number"
            [(ngModel)]="age"
            name="age"
            min="10"
            max="120"
            placeholder="z.B. 25"
          />
        </div>
        <div class="form-group">
          <label class="form-label" for="weightKg">Gewicht kg (optional)</label>
          <input
            id="weightKg"
            class="form-input"
            type="number"
            [(ngModel)]="weightKg"
            name="weightKg"
            min="30"
            max="300"
            step="0.5"
            placeholder="z.B. 80"
          />
        </div>
      </div>

      <!-- Height -->
      <div class="form-group">
        <label class="form-label" for="heightCm">Größe cm (optional)</label>
        <input
          id="heightCm"
          class="form-input"
          type="number"
          [(ngModel)]="heightCm"
          name="heightCm"
          min="100"
          max="250"
          placeholder="z.B. 180"
        />
      </div>

      <button
        type="submit"
        class="btn btn--primary"
        [disabled]="isLoading || !regForm.valid"
      >
        <span *ngIf="!isLoading">Konto erstellen</span>
        <span *ngIf="isLoading" class="spinner"></span>
      </button>
    </form>

    <p class="auth-card__footer">
      Schon ein Konto?
      <a routerLink="/login" class="auth-link">Einloggen</a>
    </p>
  </div>
</div>
