<div class="profile-page">

  <div class="profile-page__back">
    <a routerLink="/dashboard" class="back-link">← Zurück zum Dashboard</a>
  </div>

  <div class="profile-header">
    <h1 class="profile-header__title">Mein Profil</h1>
    <button class="btn btn--danger btn--sm" (click)="logout()" routerLink="/login">Ausloggen</button>
  </div>

  <div *ngIf="isLoadingProfile" class="loading-row">
    <span class="spinner"></span><span>Lade Profil…</span>
  </div>

  <ng-container *ngIf="!isLoadingProfile && profile">

    <!-- Profile Info Card -->
    <div class="card">
      <h2 class="card__title">Profildaten bearbeiten</h2>

      <div *ngIf="profileError" class="alert alert--error">⚠ {{ profileError }}</div>
      <div *ngIf="profileSuccess" class="alert alert--success">✓ {{ profileSuccess }}</div>

      <form (ngSubmit)="saveProfile()" #profileForm="ngForm" class="profile-form">

        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Username</label>
            <input class="form-input" type="text" [(ngModel)]="editUsername" name="username"
                   minlength="3" maxlength="50" placeholder="Username" />
          </div>
          <div class="form-group">
            <label class="form-label">E-Mail</label>
            <input class="form-input" type="email" [(ngModel)]="editEmail" name="email"
                   placeholder="E-Mail-Adresse" />
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">Fitnesslevel</label>
          <select class="form-select" [(ngModel)]="editFitnessLevel" name="fitnessLevel">
            <option *ngFor="let lvl of fitnessLevels" [value]="lvl.value">{{ lvl.label }}</option>
          </select>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Alter</label>
            <input class="form-input" type="number" [(ngModel)]="editAge" name="age"
                   min="10" max="120" placeholder="Jahre" />
          </div>
          <div class="form-group">
            <label class="form-label">Gewicht (kg)</label>
            <input class="form-input" type="number" [(ngModel)]="editWeightKg" name="weightKg"
                   min="30" max="300" step="0.5" placeholder="kg" />
          </div>
          <div class="form-group">
            <label class="form-label">Größe (cm)</label>
            <input class="form-input" type="number" [(ngModel)]="editHeightCm" name="heightCm"
                   min="100" max="250" placeholder="cm" />
          </div>
        </div>

        <div class="form-actions">
          <button type="submit" class="btn btn--primary" [disabled]="isSavingProfile">
            <span *ngIf="!isSavingProfile">Speichern</span>
            <span *ngIf="isSavingProfile" class="spinner"></span>
          </button>
        </div>

      </form>
    </div>

    <!-- Password Card -->
    <div class="card">
      <h2 class="card__title">Passwort ändern</h2>

      <div *ngIf="passwordError" class="alert alert--error">⚠ {{ passwordError }}</div>
      <div *ngIf="passwordSuccess" class="alert alert--success">✓ {{ passwordSuccess }}</div>

      <form (ngSubmit)="changePassword()" #pwForm="ngForm" class="profile-form">

        <div class="form-group">
          <label class="form-label">Aktuelles Passwort</label>
          <input class="form-input" type="password" [(ngModel)]="oldPassword" name="oldPassword"
                 required placeholder="Aktuelles Passwort" autocomplete="current-password" />
        </div>

        <div class="form-group">
          <label class="form-label">Neues Passwort (min. 8 Zeichen)</label>
          <input class="form-input" type="password" [(ngModel)]="newPassword" name="newPassword"
                 required minlength="8" placeholder="Neues Passwort" autocomplete="new-password" />
        </div>

        <div class="form-actions">
          <button type="submit" class="btn btn--primary"
                  [disabled]="isChangingPassword || !pwForm.valid">
            <span *ngIf="!isChangingPassword">Passwort ändern</span>
            <span *ngIf="isChangingPassword" class="spinner"></span>
          </button>
        </div>

      </form>
    </div>

    <!-- Info Row -->
    <div class="info-row" *ngIf="profile">
      <div class="info-item">
        <span class="info-item__label">Account-ID</span>
        <span class="info-item__value">#{{ profile.id }}</span>
      </div>
      <div class="info-item">
        <span class="info-item__label">Rolle</span>
        <span class="info-item__value">{{ profile.role }}</span>
      </div>
      <div class="info-item">
        <span class="info-item__label">Registriert</span>
        <span class="info-item__value">{{ profile.createdAt | date:'dd.MM.yyyy' }}</span>
      </div>
    </div>

  </ng-container>

</div>
